<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>对阵结果</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
            --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 12px 28px rgba(0,0,0,.08);
            --transition: .25s cubic-bezier(.4,0,.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 50%, #fdf2f8 100%);
            color: var(--gray-800);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .page-container {
            display: flex;
            gap: 1.5rem;
            max-width: 1100px;
            margin: 0 auto;
            align-items: flex-start;
        }
        .main-panel { flex: 3; min-width: 0; }
        .stats-panel {
            flex: 1;
            min-width: 240px;
            position: sticky;
            top: 1.5rem;
            animation: fadeUp .5s ease-out .2s both;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes cardExit { to { opacity: 0; transform: scale(.95); } }
        @keyframes pulse { 0%, 100% { box-shadow: var(--shadow); } 50% { box-shadow: 0 0 0 4px rgba(16,185,129,.2), var(--shadow); } }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeUp .5s ease-out;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--gray-500);
            margin-top: .3rem;
            font-size: .9rem;
        }

        .card {
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,.6);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.25rem;
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-lg); }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 1.1em;
            background: var(--primary);
            border-radius: 2px;
        }

        /* ── Top Actions ──────────────── */
        .top-actions {
            display: flex;
            justify-content: center;
            gap: .5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            animation: fadeUp .5s ease-out .1s both;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .55rem 1rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 2px 8px rgba(99,102,241,.25);
        }
        .btn-primary:hover { box-shadow: 0 4px 14px rgba(99,102,241,.35); transform: translateY(-1px); }
        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 2px 8px rgba(16,185,129,.25);
        }
        .btn-success:hover { box-shadow: 0 4px 14px rgba(16,185,129,.35); transform: translateY(-1px); }
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-600);
            border: 1px solid var(--gray-200);
        }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: #fff;
            box-shadow: 0 2px 8px rgba(245,158,11,.25);
        }
        .btn-accent:hover { box-shadow: 0 4px 14px rgba(245,158,11,.35); transform: translateY(-1px); }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Info Banner ─────────────── */
        .info-banner {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: var(--radius-sm);
            padding: .6rem 1rem;
            margin-bottom: 1rem;
            font-size: .85rem;
            color: #92400e;
            animation: fadeIn .4s ease-out;
            line-height: 1.5;
        }

        /* ── Match List ───────────────── */
        .match-list { display: flex; flex-direction: column; gap: .75rem; }

        .match-card {
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,.6);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all var(--transition);
            animation: cardEnter .4s ease-out both;
        }
        .match-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .match-card.exiting { animation: cardExit .25s ease-in forwards; }
        .match-card.saved { animation: pulse .6s ease; }
        .match-card.relaxed-match { border-left: 3px solid var(--accent); }

        .match-index {
            font-size: .8rem;
            font-weight: 700;
            color: var(--gray-400);
            min-width: 2rem;
            text-align: center;
            flex-shrink: 0;
        }
        .match-index span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gray-100);
        }

        .match-teams {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .75rem;
            font-size: .95rem;
            min-width: 0;
        }
        .team-name {
            font-weight: 500;
            white-space: nowrap;
        }
        .vs-badge {
            font-weight: 700;
            color: var(--primary);
            font-size: .8rem;
            flex-shrink: 0;
            padding: .15rem .5rem;
            background: #eef2ff;
            border-radius: 4px;
        }
        .relaxed-badge {
            font-size: .7rem;
            background: #fffbeb;
            color: #b45309;
            padding: .15rem .45rem;
            border-radius: 4px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .score-area {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-shrink: 0;
        }
        .score-display {
            font-weight: 600;
            font-size: .95rem;
            color: var(--gray-600);
            min-width: 60px;
            text-align: center;
        }
        .score-input { display: none; align-items: center; gap: 4px; }
        .score-input input {
            width: 42px;
            text-align: center;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            padding: .35rem;
            font-size: .9rem;
            font-weight: 600;
            outline: none;
            transition: border-color var(--transition);
        }
        .score-input input:focus { border-color: var(--primary-light); }
        .score-input .sep { font-weight: 700; color: var(--gray-400); }

        .btn-score {
            padding: .3rem .6rem;
            font-size: .78rem;
            border: 1px solid var(--gray-200);
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
            font-weight: 500;
            color: var(--gray-500);
        }
        .btn-score:hover { background: var(--gray-50); border-color: var(--gray-300); }
        .btn-score.save { color: var(--success); border-color: #a7f3d0; }
        .btn-score.save:hover { background: #ecfdf5; }

        /* ── Stats Panel ──────────────── */
        .stats-section { margin-bottom: 1.25rem; }
        .stats-section:last-child { margin-bottom: 0; }
        .stats-section h3 {
            font-size: .85rem;
            font-weight: 600;
            color: var(--gray-500);
            margin-bottom: .5rem;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .stats-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        .stats-table th {
            text-align: left;
            padding: .45rem .5rem;
            font-weight: 600;
            color: var(--gray-500);
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 2px solid var(--gray-200);
        }
        .stats-table td {
            padding: .45rem .5rem;
            border-bottom: 1px solid var(--gray-100);
        }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table td:first-child { font-weight: 600; color: var(--gray-400); text-align: center; width: 30px; }
        .stats-table td:last-child { text-align: right; font-weight: 600; }
        .stats-table .positive { color: var(--success); }
        .stats-table .negative { color: var(--danger); }

        .game-count-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        .game-count-table th {
            text-align: left;
            padding: .4rem .5rem;
            font-weight: 600;
            color: var(--gray-500);
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 2px solid var(--gray-200);
        }
        .game-count-table td { padding: .35rem .5rem; border-bottom: 1px solid var(--gray-100); }
        .game-count-table tr:last-child td { border-bottom: none; }

        /* ── Toast ────────────────────── */
        .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
        .toast { padding: .75rem 1.25rem; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 500; color: #fff; box-shadow: var(--shadow-lg); animation: toastIn .3s ease-out; cursor: pointer; }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
        .toast.info { background: var(--primary); }
        .toast.removing { animation: toastOut .25s ease-in forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

        /* ── Error Page ───────────────── */
        .error-page { max-width: 500px; margin: 0 auto; text-align: center; }
        .error-page h1 { margin-bottom: 1rem; }
        .error-page p { color: var(--danger); font-size: 1.1rem; margin-bottom: 1.5rem; }

        /* ── Share / Sync UI ─────────────── */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            font-size: .72rem;
            font-weight: 600;
            padding: .2rem .55rem;
            border-radius: 999px;
            letter-spacing: .3px;
            margin-left: .5rem;
            vertical-align: middle;
        }
        .role-badge.viewer { background: #eef2ff; color: #4338ca; }
        .role-badge.owner  { background: #ecfdf5; color: #047857; }

        .sync-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            font-size: .8rem;
            color: var(--gray-500);
            margin-bottom: .75rem;
            flex-wrap: wrap;
        }
        .sync-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gray-300);
            flex-shrink: 0;
        }
        .sync-dot.syncing { background: var(--accent); animation: pulse-dot 1s ease-in-out infinite; }
        .sync-dot.ok      { background: var(--success); }
        .sync-dot.error   { background: var(--danger); }
        @keyframes pulse-dot { 50% { opacity: .4; } }

        .sync-bar .btn-link {
            background: none;
            border: none;
            color: var(--primary);
            font-size: .8rem;
            cursor: pointer;
            padding: .15rem .3rem;
            border-radius: 4px;
        }
        .sync-bar .btn-link:hover { background: #eef2ff; }

        .share-modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(17, 24, 39, .45);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            z-index: 10000;
            animation: fadeIn .2s ease-out;
        }
        .share-modal {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 1.5rem;
            max-width: 520px;
            width: 100%;
            animation: fadeUp .25s ease-out;
        }
        .share-modal h3 {
            font-size: 1.05rem;
            margin-bottom: .5rem;
            color: var(--gray-800);
        }
        .share-modal p { font-size: .85rem; color: var(--gray-500); margin-bottom: .9rem; line-height: 1.5; }
        .share-modal .link-box {
            display: flex;
            gap: .5rem;
            margin-bottom: 1rem;
        }
        .share-modal input[type="text"] {
            flex: 1;
            padding: .55rem .75rem;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: .82rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            background: var(--gray-50);
            min-width: 0;
        }
        .share-modal .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: .5rem;
        }

        .viewer-readonly-hint {
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: var(--radius-sm);
            padding: .55rem 1rem;
            margin-bottom: 1rem;
            font-size: .82rem;
            color: #4338ca;
            line-height: 1.5;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        @media (max-width: 768px) {
            .page-container { flex-direction: column; }
            .stats-panel { position: static; width: 100%; }
            .match-card { flex-wrap: wrap; }
            .match-teams { flex-wrap: wrap; justify-content: center; }
            body { padding: 1rem .5rem; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    <div id="root"></div>

    <script src="js/lz-string.min.js"></script>
    <script src="js/matching.js"></script>
    <script src="js/share.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const root = document.getElementById('root');
        const Share = window.BadmintonShare;

        // ── 数据源优先级：URL#id > URL#d > sessionStorage ─────────
        const { id: urlId, d: urlSnapshot } = Share.parseHash();
        let shareId = urlId || null;
        let role = 'local';       // 'local' | 'owner' | 'viewer'
        let matches, players, params, matchName = '';
        let data;
        let loadError = null;

        if (shareId) {
            // 分享链接：先尝试 KV，拉不到回退快照
            try {
                const remote = await Share.fetchFromKV(shareId);
                if (remote) {
                    data = remote;
                } else if (urlSnapshot) {
                    data = Share.decompressData(urlSnapshot);
                }
            } catch (err) {
                console.warn('KV 读取失败，尝试使用 URL 快照', err);
                if (urlSnapshot) data = Share.decompressData(urlSnapshot);
                else loadError = err;
            }
            role = Share.isOwner(shareId) ? 'owner' : 'viewer';
        } else if (urlSnapshot) {
            // 纯快照链接（没有 id）
            data = Share.decompressData(urlSnapshot);
            role = 'viewer'; // 快照链接默认只读
        } else {
            // 来自本地首页生成
            const dataString = sessionStorage.getItem('current_match_data');
            if (dataString) {
                try { data = JSON.parse(dataString); } catch (_) {}
            }
            role = 'local';
        }

        if (!data) {
            root.innerHTML = `<div class="error-page card" style="margin-top:3rem;">
                <h1 style="background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">数据丢失</h1>
                <p>${loadError ? '无法加载分享的数据（可能云端已过期）。' : '没有找到对局数据，请返回首页重新生成。'}</p>
                <a href="index.html" class="btn btn-primary">返回首页</a>
            </div>`;
            return;
        }

        matches = data.matches || [];
        players = data.players || [];
        params = data.params || null;
        matchName = data.name || '';

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            toast.addEventListener('click', () => { toast.classList.add('removing'); toast.addEventListener('animationend', () => toast.remove()); });
            setTimeout(() => { if (toast.parentElement) { toast.classList.add('removing'); toast.addEventListener('animationend', () => toast.remove()); } }, 3000);
        }

        // ── 工具：获取当前可分享的数据快照 ────────────────────────
        function currentPayload() {
            return { matches, players, params, name: matchName };
        }

        // ── 同步状态 UI ────────────────────────────────────────────
        let syncStatus = { state: 'idle', text: '' }; // state: idle|syncing|ok|error

        function setSyncStatus(state, text) {
            syncStatus = { state, text };
            const bar = document.getElementById('sync-bar');
            if (!bar) return;
            const dot = bar.querySelector('.sync-dot');
            const label = bar.querySelector('.sync-label');
            if (dot) dot.className = 'sync-dot ' + (state === 'idle' ? '' : state);
            if (label) label.textContent = text;
        }

        // ── 同步器（Owner 模式才会初始化） ─────────────────────────
        let syncer = null;
        function initSyncer() {
            if (syncer || !shareId || role !== 'owner') return;
            syncer = Share.createSyncer({
                getId: () => shareId,
                getData: currentPayload,
                callbacks: {
                    onStart: () => setSyncStatus('syncing', '正在同步…'),
                    onSuccess: () => {
                        setSyncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }));
                        // 每次同步后也刷新 URL 中的快照，保证复制的链接是最新的
                        Share.updateAddressBar({ id: shareId, data: currentPayload() });
                    },
                    onError: (err, n, willRetry) => {
                        console.warn('同步失败', err);
                        setSyncStatus('error', willRetry ? `同步失败，正在重试 (${n}/3)…` : '同步失败，请检查网络');
                    },
                },
            });
        }

        // ── 轮询器（Viewer 模式才会初始化） ────────────────────────
        let poller = null;
        function initPoller() {
            if (poller || !shareId || role !== 'viewer') return;
            poller = Share.createPoller({
                getId: () => shareId,
                intervalMs: 20000,
                onUpdate: (remote) => {
                    matches = remote.matches || [];
                    players = remote.players || [];
                    params = remote.params || null;
                    matchName = remote.name || matchName;
                    render();
                    const t = remote.updatedAt ? new Date(remote.updatedAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
                    showToast(t ? `已更新到最新数据（${t}）` : '已更新到最新数据', 'info');
                },
                onError: (err) => console.warn('轮询失败', err),
            });
            poller.setBaseline(data); // 首次加载的数据作为基线，避免误报"有更新"
            poller.start();
        }

        // ── 分享弹窗 ───────────────────────────────────────────────
        function openShareModal(url, titleText, description) {
            const backdrop = document.createElement('div');
            backdrop.className = 'share-modal-backdrop';
            backdrop.innerHTML = `
                <div class="share-modal" role="dialog">
                    <h3>${titleText}</h3>
                    <p>${description}</p>
                    <div class="link-box">
                        <input type="text" id="share-url-input" readonly value="${url.replace(/"/g, '&quot;')}">
                        <button class="btn btn-primary" id="share-copy-btn">复制</button>
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-secondary" id="share-close-btn">关闭</button>
                    </div>
                </div>`;
            document.body.appendChild(backdrop);
            const input = backdrop.querySelector('#share-url-input');
            input.focus();
            input.select();
            backdrop.querySelector('#share-copy-btn').addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('链接已复制到剪贴板', 'success');
                } catch (_) {
                    input.select();
                    document.execCommand('copy');
                    showToast('链接已复制', 'success');
                }
            });
            backdrop.querySelector('#share-close-btn').addEventListener('click', () => backdrop.remove());
            backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
        }

        // ── 开启云同步 ─────────────────────────────────────────────
        async function enableCloudSync() {
            const btn = document.getElementById('cloud-share-btn');
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 上传中...'; }
            try {
                const newId = Share.generateShortId();
                await Share.uploadToKV(newId, currentPayload());
                Share.markAsOwner(newId);
                shareId = newId;
                role = 'owner';
                Share.updateAddressBar({ id: shareId, data: currentPayload() });
                render();
                initSyncer();
                setSyncStatus('ok', '已同步 · 刚刚');
                const url = Share.buildShareURL({ id: shareId, data: currentPayload() });
                openShareModal(url, '已保存到比赛历史 · 云同步已开启',
                    '这场比赛已保存到"比赛历史"（可在首页打开）。以下链接可以分享给别人，你之后改动比分或对阵，对方刷新即可看到最新。');
            } catch (err) {
                console.error(err);
                showToast('上传失败：' + (err.message || err), 'error');
                if (btn) { btn.disabled = false; btn.innerHTML = '\u2601 开启云同步并分享'; }
            }
        }

        // ── 复制纯快照分享链接 ─────────────────────────────────────
        function copySnapshotShare() {
            const url = Share.buildShareURL({ id: shareId, data: currentPayload() });
            openShareModal(url,
                shareId ? '分享链接' : '快照分享链接',
                shareId
                    ? '该链接指向云端最新数据；若云端不可达，也会自动回退到链接里内嵌的快照。'
                    : '链接里直接内嵌了对阵快照，对方打开即可查看。若之后改动比分，需要重新复制链接才能让对方看到新的状态。');
        }

        // ── 渲染 ───────────────────────────────────────────────────
        function render() {
            const hasRelaxed = matches.some(m => m.type === 'relaxed');
            const isSingles = params && params.mode === 'singles_robin';
            const pageTitle = matchName || '对阵结果';
            const isViewer = role === 'viewer';
            const isOwner = role === 'owner';
            const canEdit = !isViewer;

            const roleBadgeHtml = isViewer
                ? `<span class="role-badge viewer">\u{1F441} 访客视图</span>`
                : (isOwner ? `<span class="role-badge owner">\u{2601} 云同步中</span>` : '');

            const topActions = isViewer ? `
                    ${shareId ? `<button class="btn btn-secondary" id="viewer-refresh-btn">\u21BB 刷新</button>` : ''}
                    <a href="index.html" class="btn btn-secondary">\u2190 返回首页</a>
                ` : `
                    ${params ? `<button class="btn btn-accent" id="refresh-btn">\u21BB 重新生成</button>` : ''}
                    <button class="btn btn-primary" id="shuffle-btn">\u2195 重排对局顺序</button>
                    ${shareId
                        ? `<button class="btn btn-primary" id="share-copy-link-btn">\u{1F517} 复制分享链接</button>`
                        : `<button class="btn btn-success" id="cloud-share-btn">\u{2601} 开启云同步并分享</button>
                           <button class="btn btn-secondary" id="share-copy-link-btn">\u{1F517} 复制快照链接</button>`
                    }
                    <a href="index.html" class="btn btn-secondary">\u2190 返回首页</a>
                `;

            const syncBarHtml = (isOwner && shareId) ? `
                <div class="sync-bar" id="sync-bar">
                    <span class="sync-dot ${syncStatus.state}"></span>
                    <span class="sync-label">${syncStatus.text || '已开启云同步'}</span>
                    <button class="btn-link" id="sync-now-btn">立即同步</button>
                </div>` : '';

            const viewerHintHtml = isViewer ? `
                <div class="viewer-readonly-hint">
                    \u{1F441} 你正在以访客模式查看他人分享的对阵，此页面只读。${shareId ? '页面会每 20 秒自动拉取最新数据。' : '这是分享时的静态快照。'}
                </div>` : '';

            root.innerHTML = `
            <div class="page-container">
                <div class="main-panel">
                    <div class="header">
                        <h1>${pageTitle}${roleBadgeHtml}</h1>
                        ${matchName ? `<p>${matches.length} 场对局 · ${players.length} 位选手</p>` : ''}
                    </div>
                    <div class="top-actions">
                        ${topActions}
                    </div>
                    ${syncBarHtml}
                    ${viewerHintHtml}
                    ${hasRelaxed ? `<div class="info-banner">由于男女人数不等，部分对局采用放松配对（标有"非标准混双"标记），确保每人对局数一致。不会出现男双 vs 女双的情况。</div>` : ''}
                    <div class="match-list" id="match-list">
                        ${matches.map((match, i) => renderMatchCard(match, i, isSingles, canEdit)).join('')}
                    </div>
                </div>
                <div class="stats-panel card">
                    <div class="card-title">统计面板</div>
                    <div class="stats-section">
                        <h3>对局分布</h3>
                        <table class="game-count-table">
                            <thead><tr><th>队员</th><th>对局数</th></tr></thead>
                            <tbody id="game-count-body"></tbody>
                        </table>
                    </div>
                    <div class="stats-section">
                        <h3>男子排名</h3>
                        <table class="stats-table"><thead><tr><th>#</th><th>队员</th><th>胜/负</th><th>净胜分</th></tr></thead><tbody id="male-rank"></tbody></table>
                    </div>
                    <div class="stats-section">
                        <h3>女子排名</h3>
                        <table class="stats-table"><thead><tr><th>#</th><th>队员</th><th>胜/负</th><th>净胜分</th></tr></thead><tbody id="female-rank"></tbody></table>
                    </div>
                </div>
            </div>`;
            attachEvents();
            updateStats();
        }

        function renderMatchCard(match, index, isSingles, canEdit) {
            const isRelaxed = match.type === 'relaxed';
            const team1Text = match.team1.join(' & ');
            const team2Text = match.team2.join(' & ');
            const scoreText = (match.score && match.score.team1 != null)
                ? `${match.score.team1} : ${match.score.team2}`
                : '\u2014 : \u2014';
            const scoreControls = canEdit ? `
                    <div class="score-input">
                        <input type="number" class="s1" min="0" value="0">
                        <span class="sep">:</span>
                        <input type="number" class="s2" min="0" value="0">
                    </div>
                    <button class="btn-score edit-btn">比分</button>
                    <button class="btn-score save save-score-btn" style="display:none">保存</button>` : '';
            return `
            <div class="match-card ${isRelaxed ? 'relaxed-match' : ''}" data-index="${index}" style="animation-delay:${index * 0.06}s">
                <div class="match-index"><span>${index + 1}</span></div>
                <div class="match-teams">
                    <span class="team-name">${team1Text}</span>
                    <span class="vs-badge">VS</span>
                    <span class="team-name">${team2Text}</span>
                    ${isRelaxed ? '<span class="relaxed-badge">非标准混双</span>' : ''}
                </div>
                <div class="score-area">
                    <div class="score-display">${scoreText}</div>
                    ${scoreControls}
                </div>
            </div>`;
        }

        function attachEvents() {
            const canEdit = role !== 'viewer';

            // 比分编辑（仅可编辑模式）
            if (canEdit) {
                document.getElementById('match-list').addEventListener('click', e => {
                    const card = e.target.closest('.match-card');
                    if (!card) return;
                    const idx = parseInt(card.dataset.index, 10);

                    if (e.target.classList.contains('edit-btn')) {
                        const disp = card.querySelector('.score-display');
                        const inp = card.querySelector('.score-input');
                        const editBtn = card.querySelector('.edit-btn');
                        const saveBtn = card.querySelector('.save-score-btn');
                        disp.style.display = 'none';
                        inp.style.display = 'flex';
                        editBtn.style.display = 'none';
                        saveBtn.style.display = 'inline-flex';
                        const sc = matches[idx].score || { team1: 0, team2: 0 };
                        card.querySelector('.s1').value = sc.team1 || 0;
                        card.querySelector('.s2').value = sc.team2 || 0;
                        card.querySelector('.s1').focus();
                    } else if (e.target.classList.contains('save-score-btn')) {
                        const s1 = parseInt(card.querySelector('.s1').value, 10) || 0;
                        const s2 = parseInt(card.querySelector('.s2').value, 10) || 0;
                        matches[idx].score = { team1: s1, team2: s2 };
                        card.querySelector('.score-display').textContent = `${s1} : ${s2}`;
                        card.querySelector('.score-display').style.display = '';
                        card.querySelector('.score-input').style.display = 'none';
                        card.querySelector('.edit-btn').style.display = '';
                        card.querySelector('.save-score-btn').style.display = 'none';
                        card.classList.add('saved');
                        setTimeout(() => card.classList.remove('saved'), 700);
                        updateStats();
                        if (syncer) syncer.schedule();
                    }
                });
            }

            const shuffleBtn = document.getElementById('shuffle-btn');
            if (shuffleBtn) {
                shuffleBtn.addEventListener('click', () => {
                    // 约束下重排：尽量不让任何人连续出场 > 3 场
                    matches = Matching.reorderWithConsecutiveLimit(matches, 3);
                    render();
                    showToast('对局顺序已重新排列（已考虑体力均衡）', 'info');
                    if (syncer) syncer.schedule();
                });
            }

            const refreshBtn = document.getElementById('refresh-btn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    if (!params) return;
                    refreshBtn.innerHTML = '<span class="spinner"></span> 生成中...';
                    refreshBtn.disabled = true;
                    setTimeout(() => {
                        try {
                            matches = Matching.generate(players, params.mode, params.k);
                            sessionStorage.setItem('current_match_data', JSON.stringify({ matches, players, params, name: matchName }));
                            render();
                            showToast('已重新生成对阵', 'success');
                            if (syncer) syncer.schedule();
                        } catch (err) {
                            showToast(err.message || '生成失败', 'error');
                        } finally {
                            refreshBtn.innerHTML = '\u21BB 重新生成';
                            refreshBtn.disabled = false;
                        }
                    }, 80);
                });
            }

            const cloudShareBtn = document.getElementById('cloud-share-btn');
            if (cloudShareBtn) cloudShareBtn.addEventListener('click', enableCloudSync);

            const copyLinkBtn = document.getElementById('share-copy-link-btn');
            if (copyLinkBtn) copyLinkBtn.addEventListener('click', copySnapshotShare);

            const syncNowBtn = document.getElementById('sync-now-btn');
            if (syncNowBtn) syncNowBtn.addEventListener('click', async () => {
                if (syncer) await syncer.flush();
            });

            const viewerRefreshBtn = document.getElementById('viewer-refresh-btn');
            if (viewerRefreshBtn) viewerRefreshBtn.addEventListener('click', async () => {
                viewerRefreshBtn.innerHTML = '<span class="spinner"></span> 刷新中...';
                viewerRefreshBtn.disabled = true;
                try {
                    if (poller) await poller.refreshNow();
                    else {
                        const remote = await Share.fetchFromKV(shareId);
                        if (remote) {
                            matches = remote.matches || [];
                            players = remote.players || [];
                            params = remote.params || null;
                            matchName = remote.name || matchName;
                            render();
                        }
                    }
                } catch (err) {
                    showToast('刷新失败：' + (err.message || err), 'error');
                } finally {
                    // render() 会重新挂事件，这里的按钮引用可能已失效
                    const btn = document.getElementById('viewer-refresh-btn');
                    if (btn) { btn.innerHTML = '\u21BB 刷新'; btn.disabled = false; }
                }
            });
        }

        function updateStats() {
            const gameCounts = {};
            players.forEach(p => gameCounts[p.name] = 0);
            matches.forEach(m => {
                [...m.team1, ...m.team2].forEach(name => {
                    if (gameCounts[name] !== undefined) gameCounts[name]++;
                });
            });

            const gcBody = document.getElementById('game-count-body');
            if (gcBody) {
                gcBody.innerHTML = players.map(p =>
                    `<tr><td>${p.name}</td><td style="text-align:right;font-weight:600">${gameCounts[p.name]}</td></tr>`
                ).join('');
            }

            const stats = {};
            players.forEach(p => { stats[p.name] = { wins: 0, losses: 0, sf: 0, sa: 0, gender: p.gender }; });

            matches.forEach(m => {
                if (!m.score || m.score.team1 == null) return;
                const s1 = parseInt(m.score.team1, 10);
                const s2 = parseInt(m.score.team2, 10);
                if (isNaN(s1) || isNaN(s2)) return;

                m.team1.forEach(n => { if (stats[n]) { stats[n].sf += s1; stats[n].sa += s2; } });
                m.team2.forEach(n => { if (stats[n]) { stats[n].sf += s2; stats[n].sa += s1; } });

                if (s1 > s2) {
                    m.team1.forEach(n => { if (stats[n]) stats[n].wins++; });
                    m.team2.forEach(n => { if (stats[n]) stats[n].losses++; });
                } else if (s2 > s1) {
                    m.team2.forEach(n => { if (stats[n]) stats[n].wins++; });
                    m.team1.forEach(n => { if (stats[n]) stats[n].losses++; });
                }
            });

            const maleArr = [], femaleArr = [];
            for (const name in stats) {
                const s = stats[name];
                s.name = name;
                s.net = s.sf - s.sa;
                (s.gender === 'M' ? maleArr : femaleArr).push(s);
            }
            const sortFn = (a, b) => b.wins - a.wins || b.net - a.net;
            maleArr.sort(sortFn);
            femaleArr.sort(sortFn);

            const renderRank = (id, arr) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.innerHTML = arr.map((p, i) => {
                    const cls = p.net > 0 ? 'positive' : (p.net < 0 ? 'negative' : '');
                    return `<tr><td>${i + 1}</td><td>${p.name}</td><td>${p.wins}/${p.losses}</td><td class="${cls}">${p.net > 0 ? '+' : ''}${p.net}</td></tr>`;
                }).join('');
            };
            renderRank('male-rank', maleArr);
            renderRank('female-rank', femaleArr);
        }

        render();

        // Owner 模式：启动自动同步器
        if (role === 'owner' && shareId) {
            initSyncer();
            setSyncStatus('ok', '已开启云同步');
            // 页面关闭前尝试把未同步的改动 flush 掉
            window.addEventListener('beforeunload', () => {
                if (syncer) syncer.flush();
            });
        }

        // Viewer 模式：启动轮询
        if (role === 'viewer' && shareId) {
            initPoller();
            window.addEventListener('beforeunload', () => {
                if (poller) poller.stop();
            });
        }
    });
    </script>
</body>
</html>
