<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>比赛历史 · 羽毛球对阵生成器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
            --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 12px 28px rgba(0,0,0,.08);
            --transition: .25s cubic-bezier(.4,0,.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 50%, #fdf2f8 100%);
            color: var(--gray-800);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .container {
            max-width: 780px;
            margin: 0 auto;
            animation: fadeUp .5s ease-out;
        }
        .top-bar {
            margin-bottom: 1rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--gray-500);
            font-size: .9rem;
            margin-top: .3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .55rem 1rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
        }
        .btn:active { transform: scale(.97); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 2px 8px rgba(99,102,241,.25);
        }
        .btn-primary:hover { box-shadow: 0 4px 14px rgba(99,102,241,.35); transform: translateY(-1px); }

        .search-bar {
            display: flex;
            gap: .5rem;
            margin-bottom: 1rem;
        }
        .search-bar input {
            flex: 1;
            padding: .6rem .85rem;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: .9rem;
            background: #fff;
            outline: none;
            transition: border-color var(--transition);
        }
        .search-bar input:focus { border-color: var(--primary-light); }

        .tabs {
            display: flex;
            gap: .5rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,.75);
            border: 1px solid rgba(255,255,255,.6);
            border-radius: var(--radius);
            padding: .4rem;
            box-shadow: var(--shadow);
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            padding: .6rem .8rem;
            color: var(--gray-500);
            cursor: pointer;
            font-size: .88rem;
            font-weight: 650;
            transition: all var(--transition);
        }
        .tab-btn:hover { background: var(--gray-100); color: var(--gray-700); }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 2px 8px rgba(99,102,241,.25);
        }

        .list { display: flex; flex-direction: column; gap: .75rem; }

        .record-card {
            background: rgba(255,255,255,.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.6);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all var(--transition);
            animation: cardEnter .35s ease-out both;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .record-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .record-card.stale { opacity: .55; }

        .record-main { flex: 1; min-width: 0; }
        .record-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: .25rem;
            display: flex;
            align-items: center;
            gap: .4rem;
            flex-wrap: wrap;
        }
        .record-meta {
            font-size: .82rem;
            color: var(--gray-500);
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
        }
        .record-meta span::before { content: '·'; margin-right: .5rem; color: var(--gray-300); }
        .record-meta span:first-child::before { content: ''; margin-right: 0; }

        .mode-tag {
            font-size: .7rem;
            background: #eef2ff;
            color: var(--primary-dark);
            padding: .12rem .5rem;
            border-radius: 999px;
            font-weight: 600;
        }
        .role-tag {
            font-size: .7rem;
            padding: .12rem .5rem;
            border-radius: 999px;
            font-weight: 600;
        }
        .role-tag.owner { background: #ecfdf5; color: #047857; }
        .role-tag.viewer { background: #f3f4f6; color: var(--gray-600); }
        .error-tag {
            font-size: .7rem;
            background: #fef2f2;
            color: var(--danger);
            padding: .12rem .5rem;
            border-radius: 999px;
            font-weight: 600;
        }

        .record-actions {
            display: flex;
            gap: .4rem;
            flex-shrink: 0;
        }
        .icon-btn {
            width: 32px; height: 32px;
            border: none;
            background: transparent;
            color: var(--gray-400);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all var(--transition);
        }
        .icon-btn:hover { background: var(--gray-100); color: var(--gray-700); }
        .icon-btn.delete:hover { background: #fef2f2; color: var(--danger); }

        .empty-state, .loading-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray-500);
        }
        .empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: .6;
        }
        .empty-state .title { font-size: 1rem; font-weight: 600; margin-bottom: .5rem; color: var(--gray-700); }
        .empty-state .desc { font-size: .88rem; margin-bottom: 1.25rem; }

        .spinner-lg {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        /* Toast */
        .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
        .toast { padding: .75rem 1.25rem; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 500; color: #fff; box-shadow: var(--shadow-lg); animation: toastIn .3s ease-out; cursor: pointer; }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
        .toast.info { background: var(--primary); }
        .toast.removing { animation: toastOut .25s ease-in forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

        /* Confirm dialog */
        .confirm-backdrop {
            position: fixed; inset: 0;
            background: rgba(17,24,39,.45);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            z-index: 10000;
        }
        .confirm-box {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 1.5rem;
            max-width: 400px;
            width: 100%;
        }
        .confirm-box h3 { font-size: 1.05rem; margin-bottom: .6rem; color: var(--gray-800); }
        .confirm-box p { font-size: .88rem; color: var(--gray-500); margin-bottom: 1.2rem; line-height: 1.5; }
        .confirm-actions { display: flex; justify-content: flex-end; gap: .5rem; }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover { background: #dc2626; }

        @media (max-width: 640px) {
            body { padding: 1rem .5rem; }
            .tabs { flex-direction: column; }
            .record-card { flex-direction: column; align-items: stretch; gap: .6rem; }
            .record-actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>

    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="btn btn-secondary">← 返回首页</a>
        </div>

        <div class="header">
            <h1>历史记录</h1>
            <p id="subtitle">正在加载…</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-type="match">对局历史</button>
            <button class="tab-btn" data-type="tournament">分组历史</button>
        </div>

        <div class="search-bar" id="search-bar" style="display:none;">
            <input type="text" id="search-input" placeholder="按名称或日期搜索…">
        </div>

        <div id="content">
            <div class="loading-state">
                <div class="spinner-lg"></div>
                <div style="margin-top: 1rem;">正在从云端加载比赛记录…</div>
            </div>
        </div>
    </div>

    <script src="js/lz-string.min.js"></script>
    <script src="js/share.js"></script>
    <script>
    (async function () {
        const Share = window.BadmintonShare;
        const content = document.getElementById('content');
        const subtitle = document.getElementById('subtitle');
        const searchBar = document.getElementById('search-bar');
        const searchInput = document.getElementById('search-input');
        const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));

        let activeType = 'match'; // 'match' | 'tournament'
        let allRecords = []; // [{id, role, data, error}]

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            toast.addEventListener('click', () => {
                toast.classList.add('removing');
                toast.addEventListener('animationend', () => toast.remove());
            });
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('removing');
                    toast.addEventListener('animationend', () => toast.remove());
                }
            }, 3000);
        }

        function formatDateTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return '—';
            return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function modeLabel(mode) {
            if (mode === 'mixed') return '混合双打';
            if (mode === 'singles_robin') return '单打轮转';
            return '随机双打';
        }

        function typeLabel() {
            return activeType === 'tournament' ? '分组' : '对局';
        }

        function renderEmpty() {
            searchBar.style.display = 'none';
            if (activeType === 'tournament') {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📭</div>
                        <div class="title">还没有分组记录</div>
                        <div class="desc">在比赛分组页点击"保存到云端并复制链接"即可创建一条；打开别人分享的分组链接也会自动出现在这里。</div>
                        <a href="tournament.html" class="btn btn-primary">🏆 创建比赛分组</a>
                    </div>`;
                return;
            }
            content.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">📭</div>
                    <div class="title">还没有对局记录</div>
                    <div class="desc">在结果页点击"开启云同步并分享"即可创建一场；打开别人分享的链接也会自动出现在这里。</div>
                    <a href="generate.html" class="btn btn-primary">🎯 生成新对阵</a>
                </div>`;
        }

        function roleTagHtml(role) {
            if (role === 'owner') return `<span class="role-tag owner">我创建</span>`;
            if (role === 'viewer') return `<span class="role-tag viewer">访问过</span>`;
            return '';
        }

        function renderList(records) {
            if (records.length === 0) {
                content.innerHTML = `<div class="empty-state"><div class="desc">没有匹配的记录</div></div>`;
                return;
            }

            const html = records.map(r => {
                const d = r.data;
                if (!d) {
                    const errorMsg = r.error ? '拉取失败' : '云端已删除';
                    return `
                    <div class="record-card stale" data-id="${r.id}">
                        <div class="record-main">
                            <div class="record-title">
                                <span style="color: var(--gray-500);">未知记录</span>
                                ${roleTagHtml(r.role)}
                                <span class="error-tag">${errorMsg}</span>
                            </div>
                            <div class="record-meta"><span>ID: ${r.id}</span></div>
                        </div>
                        <div class="record-actions">
                            <button class="icon-btn delete" data-action="delete" data-id="${r.id}" title="从我的列表移除">🗑</button>
                        </div>
                    </div>`;
                }
                const title = d.name || `未命名比赛`;
                const time = formatDateTime(d.updatedAt);
                const numPlayers = activeType === 'tournament'
                    ? ((d.teams || []).length * 2)
                    : (d.players || []).length;
                const numMatches = (d.matches || []).length;
                const mode = (d.params && d.params.mode) || 'random_doubles';
                const metrics = d.metrics || {};
                const typeTag = activeType === 'tournament' ? '比赛分组' : modeLabel(mode);
                const metaHtml = activeType === 'tournament'
                    ? `
                            <span>${time}</span>
                            <span>${(d.teams || []).length} 支队伍</span>
                            <span>A ${metrics.totalA || '—'} / B ${metrics.totalB || '—'}</span>
                        `
                    : `
                            <span>${time}</span>
                            <span>${numPlayers} 位选手</span>
                            <span>${numMatches} 场对局</span>
                        `;
                return `
                <div class="record-card" data-id="${r.id}">
                    <div class="record-main">
                        <div class="record-title">
                            <span>${escapeHtml(title)}</span>
                            ${roleTagHtml(r.role)}
                            <span class="mode-tag">${typeTag}</span>
                        </div>
                        <div class="record-meta">
                            ${metaHtml}
                        </div>
                    </div>
                    <div class="record-actions">
                        <button class="icon-btn" data-action="share" data-id="${r.id}" title="复制分享链接">🔗</button>
                        <button class="icon-btn delete" data-action="delete" data-id="${r.id}" title="${r.role === 'owner' ? '删除（云端+本地）' : '从我的列表移除'}">🗑</button>
                    </div>
                </div>`;
            }).join('');
            content.innerHTML = `<div class="list">${html}</div>`;
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }

        function applyFilter() {
            const q = searchInput.value.trim().toLowerCase();
            if (!q) { renderList(allRecords); return; }
            const filtered = allRecords.filter(r => {
                const d = r.data;
                if (!d) return r.id.toLowerCase().includes(q);
                const extra = activeType === 'tournament'
                    ? ['比赛分组', `A ${((d.metrics || {}).totalA) || ''}`, `B ${((d.metrics || {}).totalB) || ''}`].join(' ')
                    : modeLabel((d.params || {}).mode);
                const text = [d.name || '', extra, formatDateTime(d.updatedAt)].join(' ').toLowerCase();
                return text.includes(q);
            });
            renderList(filtered);
        }

        function confirmDelete({ title, message, okText = '删除' }) {
            return new Promise((resolve) => {
                const backdrop = document.createElement('div');
                backdrop.className = 'confirm-backdrop';
                backdrop.innerHTML = `
                    <div class="confirm-box">
                        <h3>${escapeHtml(title)}</h3>
                        <p>${message}</p>
                        <div class="confirm-actions">
                            <button class="btn btn-secondary" data-r="cancel">取消</button>
                            <button class="btn btn-danger" data-r="ok">${escapeHtml(okText)}</button>
                        </div>
                    </div>`;
                document.body.appendChild(backdrop);
                backdrop.addEventListener('click', (e) => {
                    if (e.target === backdrop) { backdrop.remove(); resolve(false); return; }
                    const r = e.target.dataset.r;
                    if (r === 'ok') { backdrop.remove(); resolve(true); }
                    else if (r === 'cancel') { backdrop.remove(); resolve(false); }
                });
            });
        }

        async function handleDelete(id) {
            const rec = allRecords.find(x => x.id === id);
            const title = (rec && rec.data && rec.data.name) || `ID ${id}`;
            const isOwner = rec && rec.role === 'owner';
            const currentTypeLabel = typeLabel();
            const ok = await confirmDelete({
                title: isOwner ? `删除这条${currentTypeLabel}记录？` : '从列表移除？',
                message: isOwner
                    ? `"${escapeHtml(title)}" 将从云端和本地一并删除，所有查看者将再也打不开这个链接，且不可恢复。`
                    : `"${escapeHtml(title)}" 将从你的本地列表移除。这是别人创建的记录，本地移除不会影响别人，你重新打开分享链接时还会再次出现。`,
                okText: isOwner ? '删除' : '移除',
            });
            if (!ok) return;
            if (isOwner) {
                try {
                    await Share.deleteFromKV(id, activeType === 'tournament' ? { keyPrefix: Share.TOURNAMENT_KEY_PREFIX } : undefined);
                } catch (err) {
                    console.warn('KV 删除失败（容忍，仅移除本地）', err);
                    showToast('云端删除失败，已仅从本地列表移除', 'info');
                }
            }
            if (activeType === 'tournament') Share.removeTournamentRecord(id);
            else Share.removeRecord(id);
            allRecords = allRecords.filter(x => x.id !== id);
            updateSubtitle();
            if (allRecords.length === 0) renderEmpty();
            else applyFilter();
            showToast(isOwner ? '记录已删除' : '已从列表移除', 'success');
        }

        async function handleShare(id) {
            const rec = allRecords.find(x => x.id === id);
            if (!rec || !rec.data) {
                showToast('无法生成分享链接：记录不可用', 'error');
                return;
            }
            const targetPage = activeType === 'tournament' ? 'tournament.html' : 'result.html';
            const snapshot = activeType === 'tournament'
                ? {
                    type: rec.data.type || 'tournament_grouping',
                    name: rec.data.name || '',
                    candidateCount: rec.data.candidateCount || 500,
                    teams: rec.data.teams || [],
                    groups: rec.data.groups || null,
                    metrics: rec.data.metrics || null,
                    generatedAt: rec.data.generatedAt || null,
                    rulesVersion: rec.data.rulesVersion || 1,
                }
                : {
                    matches: rec.data.matches || [],
                    players: rec.data.players || [],
                    params: rec.data.params || null,
                    name: rec.data.name || '',
                };
            const url = location.origin + location.pathname.replace(/history\.html$/, targetPage) + '#id=' + encodeURIComponent(id) + '&d=' + Share.compressData(snapshot);
            try {
                await navigator.clipboard.writeText(url);
                showToast('分享链接已复制到剪贴板', 'success');
            } catch (_) {
                const ta = document.createElement('textarea');
                ta.value = url;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showToast('链接已复制', 'success');
            }
        }

        function updateSubtitle() {
            const n = allRecords.length;
            const owner = allRecords.filter(r => r.role === 'owner').length;
            const viewer = allRecords.filter(r => r.role === 'viewer').length;
            const errorCount = allRecords.filter(r => !r.data).length;
            if (n === 0) {
                subtitle.textContent = `暂无${typeLabel()}记录`;
                return;
            }
            let base = `共 ${n} 条${typeLabel()}记录 · 我创建 ${owner} · 访问过 ${viewer}`;
            if (errorCount > 0) base += ` · ${errorCount} 条云端不可用`;
            subtitle.textContent = base;
        }

        // ── 初始加载 ────────────────────────────────────────────────
        function setActiveTab(type) {
            activeType = type;
            tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
            searchInput.value = '';
        }

        async function loadRecords(type) {
            setActiveTab(type);
            content.innerHTML = `
                <div class="loading-state">
                    <div class="spinner-lg"></div>
                    <div style="margin-top: 1rem;">正在从云端加载${typeLabel()}记录…</div>
                </div>`;
            searchBar.style.display = 'none';

            const counts = activeType === 'tournament' ? Share.countTournamentsByRole() : Share.countByRole();
            if (counts.total === 0) {
                allRecords = [];
                updateSubtitle();
                renderEmpty();
                return;
            }

            let records;
            try {
                records = activeType === 'tournament' ? await Share.listAllTournamentRecords() : await Share.listAllRecords();
            } catch (err) {
                console.error(err);
                content.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><div class="title">加载失败</div><div class="desc">${escapeHtml(err.message || String(err))}</div></div>`;
                return;
            }

            records.sort((a, b) => {
                const ta = a.data && a.data.updatedAt ? new Date(a.data.updatedAt).getTime() : 0;
                const tb = b.data && b.data.updatedAt ? new Date(b.data.updatedAt).getTime() : 0;
                return tb - ta;
            });
            allRecords = records;
            updateSubtitle();

            if (records.length === 0) {
                renderEmpty();
                return;
            }

            searchBar.style.display = '';
            renderList(records);
        }

        // 事件委托
        content.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            if (btn) {
                e.preventDefault();
                e.stopPropagation();
                const id = btn.dataset.id;
                const action = btn.dataset.action;
                if (action === 'delete') handleDelete(id);
                else if (action === 'share') handleShare(id);
                return;
            }
            const card = e.target.closest('.record-card');
            if (card && !card.classList.contains('stale')) {
                const id = card.dataset.id;
                const targetPage = activeType === 'tournament' ? 'tournament.html' : 'result.html';
                location.href = `${targetPage}#id=${encodeURIComponent(id)}`;
            }
        });

        searchInput.addEventListener('input', applyFilter);
        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.type !== activeType) loadRecords(btn.dataset.type);
            });
        });

        await loadRecords('match');
    })();
    </script>
</body>
</html>
