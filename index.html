<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>羽毛球对阵生成器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --radius: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
            --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 12px 28px rgba(0,0,0,.08);
            --transition: .25s cubic-bezier(.4,0,.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 50%, #fdf2f8 100%);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 920px;
            width: 100%;
            text-align: center;
            animation: fadeUp .6s ease-out;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { opacity: 0; transform: scale(.92); } to { opacity: 1; transform: scale(1); } }

        .hero { margin-bottom: 2.5rem; }
        .hero h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -.02em;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: .6rem;
        }
        .hero p {
            color: var(--gray-500);
            font-size: 1rem;
        }

        .entry-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .entry-card {
            background: rgba(255,255,255,.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,.6);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .5rem;
            animation: pop .45s ease-out both;
            position: relative;
            overflow: hidden;
        }
        .entry-card:nth-child(1) { animation-delay: .05s; }
        .entry-card:nth-child(2) { animation-delay: .15s; }
        .entry-card:nth-child(3) { animation-delay: .25s; }

        .entry-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(99,102,241,.25);
        }
        .entry-card:active { transform: translateY(-2px) scale(.99); }

        .entry-card .icon {
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: .5rem;
        }
        .entry-card .title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gray-800);
        }
        .entry-card .desc {
            font-size: .88rem;
            color: var(--gray-500);
        }
        .entry-card .badge {
            position: absolute;
            top: .9rem;
            right: .9rem;
            font-size: .7rem;
            font-weight: 700;
            color: var(--primary);
            background: #eef2ff;
            padding: .15rem .5rem;
            border-radius: 999px;
        }
        .entry-card.primary {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: #fff;
            border-color: transparent;
        }
        .entry-card.primary .title { color: #fff; }
        .entry-card.primary .desc { color: rgba(255,255,255,.85); }

        .footer {
            color: var(--gray-400);
            font-size: .8rem;
            line-height: 1.6;
        }
        .footer a {
            color: var(--gray-500);
            text-decoration: none;
        }
        .footer a:hover { color: var(--primary); }

        @media (max-width: 640px) {
            .hero h1 { font-size: 1.75rem; }
            .entry-grid { grid-template-columns: 1fr; }
            .entry-card { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🏸 羽毛球对阵生成器</h1>
            <p>智能匹配 · 公平对战 · 一键分享</p>
        </div>

        <div class="entry-grid">
            <a class="entry-card primary" href="generate.html">
                <div class="icon">🎯</div>
                <div class="title">生成新对阵</div>
                <div class="desc">开始一场新比赛</div>
            </a>
            <a class="entry-card" href="history.html">
                <div class="icon">📜</div>
                <div class="title">查看历史记录</div>
                <div class="desc" id="hist-desc">—</div>
                <span class="badge" id="hist-badge" style="display:none;"></span>
            </a>
            <a class="entry-card" href="tournament.html">
                <div class="icon">🏆</div>
                <div class="title">比赛分组</div>
                <div class="desc">12 队分组与赛制说明</div>
            </a>
        </div>

        <div class="footer">
            支持随机双打、混合双打、单打轮转、12 队比赛分组；自动均衡对局数与体力连场<br>
            实时录入比分 · 自动生成排名 · 分享链接一键直达
        </div>
    </div>

    <script src="js/lz-string.min.js"></script>
    <script src="js/share.js"></script>
    <script>
        (function () {
            const matchCounts = BadmintonShare.countByRole();
            const tournamentCounts = BadmintonShare.countTournamentsByRole();
            const total = matchCounts.total + tournamentCounts.total;
            const desc = document.getElementById('hist-desc');
            const badge = document.getElementById('hist-badge');
            if (total > 0) {
                const parts = [];
                if (matchCounts.total > 0) parts.push(`对局 ${matchCounts.total}`);
                if (tournamentCounts.total > 0) parts.push(`分组 ${tournamentCounts.total}`);
                desc.textContent = parts.join(' · ');
                badge.textContent = total > 99 ? '99+' : String(total);
                badge.style.display = '';
            } else {
                desc.textContent = '暂无记录';
            }
        })();
    </script>
</body>
</html>
